{% extends "base.html" %}

{% block title %}Add Author — Book Alchemy{% endblock %}

{% block content %}
  <h1>Add Author</h1>

  <form class="form-card" action="/add_author" method="POST">
    <div class="form-group">
      <label for="name">Author Name</label>
      <input type="text" id="name" name="name" required>
    </div>

    <div class="form-group">
      <label for="birthdate">Birthdate</label>
      <input type="date" id="birthdate" name="birthdate" required>
    </div>

    <div class="form-group">
      <label for="date_of_death">Date of Death <span class="optional">(optional)</span></label>
      <input type="date" id="date_of_death" name="date_of_death">
    </div>

    <button type="submit" class="btn-submit">Add Author</button>
  </form>
{% endblock %}
