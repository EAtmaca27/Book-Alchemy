{% extends "base.html" %}

{% block title %}Library — Book Alchemy{% endblock %}

{% block content %}
  <h1>Library</h1>

  <form class="controls" method="GET" action="/">
    <input type="text" name="query" id="query" value="{{ query }}" placeholder="Search by title or author">
    <button type="submit">Search</button>

    <label for="sort">Sort by:</label>
    <select name="sort" id="sort" onchange="this.form.submit()">
      <option value="title" {% if sort == 'title' %}selected{% endif %}>Title</option>
      <option value="author" {% if sort == 'author' %}selected{% endif %}>Author</option>
    </select>
  </form>

  {% if books %}
    <div class="book-grid">
      {% for book in books %}
      <div class="book-card">
        <a class="book-card-link" href="{{ url_for('book_detail', book_id=book.id) }}">
          <img
            class="book-cover"
            src="https://covers.openlibrary.org/b/isbn/{{ book.isbn }}-M.jpg"
            alt="Cover of {{ book.title }}"
            onerror="this.src='{{ url_for('static', filename='no_cover.png') }}'">
          <div class="book-info">
            <h3>{{ book.title }}</h3>
            <p>{{ book.author.name }}</p>
          </div>
        </a>
        <form method="POST" action="/book/{{ book.id }}/delete">
          <button class="btn-delete" type="submit">Delete</button>
        </form>
      </div>
      {% endfor %}
    </div>
  {% elif query %}
    <p class="no-results">No books or authors found for "{{ query }}"!</p>
  {% endif %}
{% endblock %}
